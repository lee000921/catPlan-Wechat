<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 950">
  <!-- Background -->
  <rect width="950" height="950" fill="#f5e6c8"/>
  
  <!-- Title -->
  <text x="475" y="35" font-size="26" font-weight="bold" text-anchor="middle" fill="#4a3728">
    🏠 星露谷物语 - 祝尼魔小屋 + 洒水器布局图
  </text>
  <text x="475" y="62" font-size="15" text-anchor="middle" fill="#6b5344">
    祝尼魔小屋 15×15 覆盖 · 洒水器 7×7 覆盖（居中放置）
  </text>
  
  <!-- Info box -->
  <g transform="translate(75, 85)">
    <rect width="800" height="55" fill="#e3f2fd" stroke="#2196f3" stroke-width="2" rx="5"/>
    <text x="400" y="22" font-size="13" text-anchor="middle" fill="#1565c0" font-weight="bold">📊 准确数据（猫咪大王确认版）</text>
    <text x="400" y="42" font-size="12" text-anchor="middle" fill="#5d4037">🏠 祝尼魔小屋：15×15 覆盖，占地 3×2 | 💧 洒水器：7×7 覆盖，必须放在土地正中央</text>
  </g>
  
  <!-- Main Grid (15×15 for Junimo coverage) -->
  <g transform="translate(75, 160)">
    <!-- Grid background -->
    <rect width="600" height="600" fill="#8bc34a" stroke="#4a3728" stroke-width="3"/>
    
    <!-- Grid lines (15×15) -->
    <g stroke="#689f38" stroke-width="1">
      <!-- Vertical lines -->
      <line x1="40" y1="0" x2="40" y2="600"/>
      <line x1="80" y1="0" x2="80" y2="600"/>
      <line x1="120" y1="0" x2="120" y2="600"/>
      <line x1="160" y1="0" x2="160" y2="600"/>
      <line x1="200" y1="0" x2="200" y2="600"/>
      <line x1="240" y1="0" x2="240" y2="600"/>
      <line x1="280" y1="0" x2="280" y2="600"/>
      <line x1="320" y1="0" x2="320" y2="600"/>
      <line x1="360" y1="0" x2="360" y2="600"/>
      <line x1="400" y1="0" x2="400" y2="600"/>
      <line x1="440" y1="0" x2="440" y2="600"/>
      <line x1="480" y1="0" x2="480" y2="600"/>
      <line x1="520" y1="0" x2="520" y2="600"/>
      <line x1="560" y1="0" x2="560" y2="600"/>
      
      <!-- Horizontal lines -->
      <line x1="0" y1="40" x2="600" y2="40"/>
      <line x1="0" y1="80" x2="600" y2="80"/>
      <line x1="0" y1="120" x2="600" y2="120"/>
      <line x1="0" y1="160" x2="600" y2="160"/>
      <line x1="0" y1="200" x2="600" y2="200"/>
      <line x1="0" y1="240" x2="600" y2="240"/>
      <line x1="0" y1="280" x2="600" y2="280"/>
      <line x1="0" y1="320" x2="600" y2="320"/>
      <line x1="0" y1="360" x2="600" y2="360"/>
      <line x1="0" y1="400" x2="600" y2="400"/>
      <line x1="0" y1="440" x2="600" y2="440"/>
      <line x1="0" y1="480" x2="600" y2="480"/>
      <line x1="0" y1="520" x2="600" y2="520"/>
      <line x1="0" y1="560" x2="600" y2="560"/>
    </g>
    
    <!-- Junimo Hut coverage zone (15×15) - highlight border -->
    <rect x="0" y="0" width="600" height="600" fill="none" stroke="#ff9800" stroke-width="4" stroke-dasharray="8,4"/>
    
    <!-- Crop areas (where sprinkler 7×7 can cover within 15×15) -->
    <!-- Each 7×7 block, sprinkler at center (position 3,3 within each block) -->
    <g fill="#a5d6a7" opacity="0.7">
      <!-- Block 1: top-left -->
      <rect x="40" y="40" width="280" height="280"/>
      <!-- Block 2: top-right -->
      <rect x="280" y="40" width="280" height="280"/>
      <!-- Block 3: bottom-left -->
      <rect x="40" y="280" width="280" height="280"/>
      <!-- Block 4: bottom-right -->
      <rect x="280" y="280" width="280" height="280"/>
    </g>
    
    <!-- Sprinklers at center of each 7×7 block -->
    <g font-size="22" text-anchor="middle" dominant-baseline="central">
      <!-- Sprinkler 1: (3,3) -->
      <circle cx="140" cy="140" r="22" fill="#2196f3" stroke="#1565c0" stroke-width="3"/>
      <text x="140" y="140" fill="white" font-size="18">💧</text>
      
      <!-- Sprinkler 2: (10,3) -->
      <circle cx="420" cy="140" r="22" fill="#2196f3" stroke="#1565c0" stroke-width="3"/>
      <text x="420" y="140" fill="white" font-size="18">💧</text>
      
      <!-- Sprinkler 3: (3,10) -->
      <circle cx="140" cy="420" r="22" fill="#2196f3" stroke="#1565c0" stroke-width="3"/>
      <text x="140" y="420" fill="white" font-size="18">💧</text>
      
      <!-- Sprinkler 4: (10,10) -->
      <circle cx="420" cy="420" r="22" fill="#2196f3" stroke="#1565c0" stroke-width="3"/>
      <text x="420" y="420" fill="white" font-size="18">💧</text>
    </g>
    
    <!-- Junimo Hut (3×2) - placed at bottom center -->
    <g transform="translate(240, 520)">
      <rect width="120" height="80" fill="#8d6e63" stroke="#4e342e" stroke-width="3"/>
      <polygon points="0,0 60,-35 120,0" fill="#5d4037"/>
      <rect x="45" y="30" width="30" height="50" fill="#3e2723"/>
      <text x="60" y="65" font-size="20" text-anchor="middle">🏠</text>
      <text x="60" y="-10" font-size="11" text-anchor="middle" fill="#4a3728">占地 3×2</text>
    </g>
    
    <!-- Path areas (gray) -->
    <g fill="#9e9e9e" opacity="0.35">
      <rect x="280" y="0" width="40" height="600"/>
      <rect x="0" y="280" width="600" height="40"/>
    </g>
    
    <!-- Axis labels -->
    <g font-size="10" fill="#4a3728" text-anchor="middle">
      <!-- X axis -->
      <text x="20" y="25">0</text>
      <text x="60" y="25">1</text>
      <text x="100" y="25">2</text>
      <text x="140" y="25">3</text>
      <text x="180" y="25">4</text>
      <text x="220" y="25">5</text>
      <text x="260" y="25">6</text>
      <text x="300" y="25">7</text>
      <text x="340" y="25">8</text>
      <text x="380" y="25">9</text>
      <text x="420" y="25">10</text>
      <text x="460" y="25">11</text>
      <text x="500" y="25">12</text>
      <text x="540" y="25">13</text>
      <text x="580" y="25">14</text>
      
      <!-- Y axis -->
      <text x="-15" y="25">0</text>
      <text x="-15" y="65">1</text>
      <text x="-15" y="105">2</text>
      <text x="-15" y="145">3</text>
      <text x="-15" y="185">4</text>
      <text x="-15" y="225">5</text>
      <text x="-15" y="265">6</text>
      <text x="-15" y="305">7</text>
      <text x="-15" y="345">8</text>
      <text x="-15" y="385">9</text>
      <text x="-15" y="425">10</text>
      <text x="-15" y="465">11</text>
      <text x="-15" y="505">12</text>
      <text x="-15" y="545">13</text>
      <text x="-15" y="585">14</text>
    </g>
    
    <!-- Coverage indicator text -->
    <text x="300" y="300" font-size="16" text-anchor="middle" fill="#2e7d32" font-weight="bold">15×15 祝尼魔覆盖区</text>
    <text x="300" y="320" font-size="13" text-anchor="middle" fill="#1b5e20">225 格 · 4 个洒水器</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(75, 780)">
    <text x="0" y="0" font-size="15" font-weight="bold" fill="#4a3728">📋 图例:</text>
    
    <g font-size="13" fill="#4a3728">
      <text x="0" y="28">🏠 祝尼魔小屋 (占地 3×2)</text>
      <text x="200" y="28">💧 洒水器 (7×7 覆盖，居中放置)</text>
      <text x="450" y="28">🟩 作物区 (同时被两者覆盖)</text>
      <text x="700" y="28">⬜ 路径</text>
    </g>
    
    <text x="0" y="55" font-size="13" fill="#2e7d32" font-weight="bold">
      📊 统计：15×15 = 225 格 · 4 个洒水器全覆盖 · 祝尼魔自动收获
    </text>
    
    <text x="0" y="80" font-size="12" fill="#e65100">
      💡 提示：洒水器放在每个 7×7 区域的正中央（第 4 格）
    </text>
  </g>
</svg>
