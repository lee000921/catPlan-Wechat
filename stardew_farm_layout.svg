<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850">
  <!-- Background -->
  <rect width="800" height="850" fill="#f5e6c8"/>
  
  <!-- Title -->
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#4a3728">
    🏠 星露谷物语 - 祝尼魔小屋 + 洒水器布局图
  </text>
  <text x="400" y="60" font-size="14" text-anchor="middle" fill="#6b5344">
    标准农场 · 17×17 祝尼魔覆盖范围 · 6 个铱金洒水器
  </text>
  
  <!-- Grid container -->
  <g transform="translate(50, 80)">
    <!-- Grid background -->
    <rect width="680" height="680" fill="#8bc34a" stroke="#4a3728" stroke-width="3"/>
    
    <!-- Grid lines -->
    <g stroke="#689f38" stroke-width="1">
      <!-- Vertical lines -->
      <line x1="40" y1="0" x2="40" y2="680"/>
      <line x1="80" y1="0" x2="80" y2="680"/>
      <line x1="120" y1="0" x2="120" y2="680"/>
      <line x1="160" y1="0" x2="160" y2="680"/>
      <line x1="200" y1="0" x2="200" y2="680"/>
      <line x1="240" y1="0" x2="240" y2="680"/>
      <line x1="280" y1="0" x2="280" y2="680"/>
      <line x1="320" y1="0" x2="320" y2="680"/>
      <line x1="360" y1="0" x2="360" y2="680"/>
      <line x1="400" y1="0" x2="400" y2="680"/>
      <line x1="440" y1="0" x2="440" y2="680"/>
      <line x1="480" y1="0" x2="480" y2="680"/>
      <line x1="520" y1="0" x2="520" y2="680"/>
      <line x1="560" y1="0" x2="560" y2="680"/>
      <line x1="600" y1="0" x2="600" y2="680"/>
      <line x1="640" y1="0" x2="640" y2="680"/>
      
      <!-- Horizontal lines -->
      <line x1="0" y1="40" x2="680" y2="40"/>
      <line x1="0" y1="80" x2="680" y2="80"/>
      <line x1="0" y1="120" x2="680" y2="120"/>
      <line x1="0" y1="160" x2="680" y2="160"/>
      <line x1="0" y1="200" x2="680" y2="200"/>
      <line x1="0" y1="240" x2="680" y2="240"/>
      <line x1="0" y1="280" x2="680" y2="280"/>
      <line x1="0" y1="320" x2="680" y2="320"/>
      <line x1="0" y1="360" x2="680" y2="360"/>
      <line x1="0" y1="400" x2="680" y2="400"/>
      <line x1="0" y1="440" x2="680" y2="440"/>
      <line x1="0" y1="480" x2="680" y2="480"/>
      <line x1="0" y1="520" x2="680" y2="520"/>
      <line x1="0" y1="560" x2="680" y2="560"/>
      <line x1="0" y1="600" x2="680" y2="600"/>
      <line x1="0" y1="640" x2="680" y2="640"/>
    </g>
    
    <!-- Crop areas (light green) -->
    <g fill="#a5d6a7" opacity="0.6">
      <!-- Block 1: rows 1-5, cols 1-5 -->
      <rect x="40" y="40" width="200" height="200"/>
      <!-- Block 2: rows 1-5, cols 7-11 -->
      <rect x="280" y="40" width="200" height="200"/>
      <!-- Block 3: rows 7-11, cols 1-5 -->
      <rect x="40" y="280" width="200" height="200"/>
      <!-- Block 4: rows 7-11, cols 7-11 -->
      <rect x="280" y="280" width="200" height="200"/>
      <!-- Block 5: rows 13-16, cols 1-5 -->
      <rect x="40" y="520" width="200" height="160"/>
      <!-- Block 6: rows 12-16, cols 7-11 -->
      <rect x="280" y="480" width="200" height="200"/>
    </g>
    
    <!-- Sprinklers (blue circles) -->
    <g font-size="20" text-anchor="middle" dominant-baseline="central">
      <!-- Sprinkler 1: (3,3) -->
      <circle cx="140" cy="140" r="18" fill="#2196f3" stroke="#1565c0" stroke-width="2"/>
      <text x="140" y="140" fill="white" font-size="16">💧</text>
      
      <!-- Sprinkler 2: (8,3) -->
      <circle cx="340" cy="140" r="18" fill="#2196f3" stroke="#1565c0" stroke-width="2"/>
      <text x="340" y="140" fill="white" font-size="16">💧</text>
      
      <!-- Sprinkler 3: (3,9) -->
      <circle cx="140" cy="380" r="18" fill="#2196f3" stroke="#1565c0" stroke-width="2"/>
      <text x="140" y="380" fill="white" font-size="16">💧</text>
      
      <!-- Sprinkler 4: (8,9) -->
      <circle cx="340" cy="380" r="18" fill="#2196f3" stroke="#1565c0" stroke-width="2"/>
      <text x="340" y="380" fill="white" font-size="16">💧</text>
      
      <!-- Sprinkler 5: (3,15) -->
      <circle cx="140" cy="620" r="18" fill="#2196f3" stroke="#1565c0" stroke-width="2"/>
      <text x="140" y="620" fill="white" font-size="16">💧</text>
      
      <!-- Sprinkler 6: (8,14) -->
      <circle cx="340" cy="580" r="18" fill="#2196f3" stroke="#1565c0" stroke-width="2"/>
      <text x="340" y="580" fill="white" font-size="16">💧</text>
    </g>
    
    <!-- Junimo Hut (brown house) -->
    <g transform="translate(100, 580)">
      <rect width="120" height="100" fill="#8d6e63" stroke="#4e342e" stroke-width="3"/>
      <polygon points="0,0 60,-40 120,0" fill="#5d4037"/>
      <rect x="45" y="40" width="30" height="60" fill="#3e2723"/>
      <text x="60" y="80" font-size="20" text-anchor="middle">🏠</text>
    </g>
    
    <!-- Path areas (gray) -->
    <g fill="#9e9e9e" opacity="0.4">
      <rect x="0" y="0" width="680" height="40"/>
      <rect x="0" y="240" width="680" height="40"/>
      <rect x="0" y="480" width="680" height="40"/>
      <rect x="240" y="0" width="40" height="680"/>
      <rect x="480" y="0" width="40" height="680"/>
    </g>
    
    <!-- Axis labels -->
    <g font-size="10" fill="#4a3728" text-anchor="middle">
      <!-- X axis -->
      <text x="20" y="25">0</text>
      <text x="60" y="25">1</text>
      <text x="100" y="25">2</text>
      <text x="140" y="25">3</text>
      <text x="180" y="25">4</text>
      <text x="220" y="25">5</text>
      <text x="260" y="25">6</text>
      <text x="300" y="25">7</text>
      <text x="340" y="25">8</text>
      <text x="380" y="25">9</text>
      <text x="420" y="25">10</text>
      <text x="460" y="25">11</text>
      <text x="500" y="25">12</text>
      <text x="540" y="25">13</text>
      <text x="580" y="25">14</text>
      <text x="620" y="25">15</text>
      <text x="660" y="25">16</text>
      
      <!-- Y axis -->
      <text x="-15" y="25">0</text>
      <text x="-15" y="65">1</text>
      <text x="-15" y="105">2</text>
      <text x="-15" y="145">3</text>
      <text x="-15" y="185">4</text>
      <text x="-15" y="225">5</text>
      <text x="-15" y="265">6</text>
      <text x="-15" y="305">7</text>
      <text x="-15" y="345">8</text>
      <text x="-15" y="385">9</text>
      <text x="-15" y="425">10</text>
      <text x="-15" y="465">11</text>
      <text x="-15" y="505">12</text>
      <text x="-15" y="545">13</text>
      <text x="-15" y="585">14</text>
      <text x="-15" y="625">15</text>
      <text x="-15" y="665">16</text>
    </g>
  </g>
  
  <!-- Legend -->
  <g transform="translate(50, 780)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#4a3728">图例:</text>
    
    <g font-size="12" fill="#4a3728">
      <text x="0" y="25">🏠 祝尼魔小屋 (3×3)</text>
      <text x="180" y="25">💧 铱金洒水器 (覆盖 5×5)</text>
      <text x="380" y="25">🟩 作物区 (113 格)</text>
      <text x="540" y="25">⬜ 路径/空地</text>
    </g>
    
    <text x="0" y="50" font-size="12" fill="#4a3728">
      📊 统计：可种植 113 格 · 洒水器 6 个 · 覆盖范围 17×17
    </text>
  </g>
</svg>
