<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
  <!-- Background -->
  <rect width="1000" height="1000" fill="#f5e6c8"/>
  
  <!-- Title -->
  <text x="500" y="35" font-size="28" font-weight="bold" text-anchor="middle" fill="#4a3728">
    🏠 星露谷物语 - 祝尼魔小屋 + 洒水器布局图（修正版）
  </text>
  <text x="500" y="65" font-size="16" text-anchor="middle" fill="#6b5344">
    小屋门口为中心 · 向各方向延伸 8 格 = 17×17
  </text>
  
  <!-- Info box -->
  <g transform="translate(100, 90)">
    <rect width="800" height="65" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="6"/>
    <text x="400" y="25" font-size="14" text-anchor="middle" fill="#e65100" font-weight="bold">📊 祝尼魔小屋覆盖规则</text>
    <text x="400" y="48" font-size="13" text-anchor="middle" fill="#5d4037">🏠 小屋占地 3×2，门口在底部中间</text>
    <text x="400" y="65" font-size="13" text-anchor="middle" fill="#e65100">📍 从门口向各方向延伸 8 格 = 17×17 覆盖区（门口在覆盖区正中心）</text>
  </g>
  
  <!-- Main Grid (17×17 for Junimo coverage) -->
  <g transform="translate(100, 175)">
    <!-- Grid background -->
    <rect width="680" height="680" fill="#8bc34a" stroke="#4a3728" stroke-width="4"/>
    
    <!-- Grid lines (17×17) -->
    <g stroke="#689f38" stroke-width="1">
      <!-- Vertical lines -->
      <line x1="40" y1="0" x2="40" y2="680"/>
      <line x1="80" y1="0" x2="80" y2="680"/>
      <line x1="120" y1="0" x2="120" y2="680"/>
      <line x1="160" y1="0" x2="160" y2="680"/>
      <line x1="200" y1="0" x2="200" y2="680"/>
      <line x1="240" y1="0" x2="240" y2="680"/>
      <line x1="280" y1="0" x2="280" y2="680"/>
      <line x1="320" y1="0" x2="320" y2="680"/>
      <line x1="360" y1="0" x2="360" y2="680"/>
      <line x1="400" y1="0" x2="400" y2="680"/>
      <line x1="440" y1="0" x2="440" y2="680"/>
      <line x1="480" y1="0" x2="480" y2="680"/>
      <line x1="520" y1="0" x2="520" y2="680"/>
      <line x1="560" y1="0" x2="560" y2="680"/>
      <line x1="600" y1="0" x2="600" y2="680"/>
      <line x1="640" y1="0" x2="640" y2="680"/>
      
      <!-- Horizontal lines -->
      <line x1="0" y1="40" x2="680" y2="40"/>
      <line x1="0" y1="80" x2="680" y2="80"/>
      <line x1="0" y1="120" x2="680" y2="120"/>
      <line x1="0" y1="160" x2="680" y2="160"/>
      <line x1="0" y1="200" x2="680" y2="200"/>
      <line x1="0" y1="240" x2="680" y2="240"/>
      <line x1="0" y1="280" x2="680" y2="280"/>
      <line x1="0" y1="320" x2="680" y2="320"/>
      <line x1="0" y1="360" x2="680" y2="360"/>
      <line x1="0" y1="400" x2="680" y2="400"/>
      <line x1="0" y1="440" x2="680" y2="440"/>
      <line x1="0" y1="480" x2="680" y2="480"/>
      <line x1="0" y1="520" x2="680" y2="520"/>
      <line x1="0" y1="560" x2="680" y2="560"/>
      <line x1="0" y1="600" x2="680" y2="600"/>
      <line x1="0" y1="640" x2="680" y2="640"/>
    </g>
    
    <!-- Junimo Hut coverage zone (17×17) - highlight border -->
    <rect x="0" y="0" width="680" height="680" fill="none" stroke="#ff9800" stroke-width="5" stroke-dasharray="10,5"/>
    
    <!-- Center point indicator (door position) -->
    <circle cx="340" cy="340" r="8" fill="#ff5722"/>
    <text x="340" y="325" font-size="11" text-anchor="middle" fill="#e65100" font-weight="bold">门口中心</text>
    
    <!-- Sprinkler 7×7 coverage areas -->
    <g fill="#a5d6a7" opacity="0.75">
      <!-- Block 1: top-left -->
      <rect x="40" y="40" width="280" height="280"/>
      <!-- Block 2: top-right -->
      <rect x="320" y="40" width="280" height="280"/>
      <!-- Block 3: bottom-left -->
      <rect x="40" y="320" width="280" height="280"/>
      <!-- Block 4: bottom-right -->
      <rect x="320" y="320" width="280" height="280"/>
    </g>
    
    <!-- Sprinklers at center of each 7×7 block (position 3,3 within each block) -->
    <g font-size="24" text-anchor="middle" dominant-baseline="central">
      <!-- Sprinkler 1: (3,3) -->
      <circle cx="160" cy="160" r="24" fill="#2196f3" stroke="#1565c0" stroke-width="4"/>
      <text x="160" y="160" fill="white" font-size="20">💧</text>
      
      <!-- Sprinkler 2: (10,3) -->
      <circle cx="440" cy="160" r="24" fill="#2196f3" stroke="#1565c0" stroke-width="4"/>
      <text x="440" y="160" fill="white" font-size="20">💧</text>
      
      <!-- Sprinkler 3: (3,10) -->
      <circle cx="160" cy="440" r="24" fill="#2196f3" stroke="#1565c0" stroke-width="4"/>
      <text x="160" y="440" fill="white" font-size="20">💧</text>
      
      <!-- Sprinkler 4: (10,10) -->
      <circle cx="440" cy="440" r="24" fill="#2196f3" stroke="#1565c0" stroke-width="4"/>
      <text x="440" y="440" fill="white" font-size="20">💧</text>
    </g>
    
    <!-- Junimo Hut (3×2) - placed at CENTER, door at (8,8) = position (320, 320) -->
    <!-- Hut occupies columns 7-9, rows 7-8 (0-indexed) -->
    <g transform="translate(260, 260)">
      <rect width="120" height="80" fill="#8d6e63" stroke="#4e342e" stroke-width="4"/>
      <polygon points="0,0 60,-40 120,0" fill="#5d4037"/>
      <!-- Door at bottom center -->
      <rect x="45" y="30" width="30" height="50" fill="#3e2723"/>
      <text x="60" y="70" font-size="22" text-anchor="middle">🏠</text>
      <text x="60" y="-15" font-size="12" text-anchor="middle" fill="#e65100" font-weight="bold">占地 3×2</text>
    </g>
    
    <!-- Door position marker -->
    <circle cx="320" cy="340" r="5" fill="#ff5722"/>
    <text x="320" y="360" font-size="10" text-anchor="middle" fill="#e65100">门口</text>
    
    <!-- Path areas (gray) -->
    <g fill="#9e9e9e" opacity="0.35">
      <rect x="280" y="0" width="80" height="680"/>
      <rect x="0" y="280" width="680" height="80"/>
    </g>
    
    <!-- Axis labels -->
    <g font-size="11" fill="#4a3728" text-anchor="middle" font-weight="500">
      <!-- X axis -->
      <text x="20" y="25">0</text>
      <text x="60" y="25">1</text>
      <text x="100" y="25">2</text>
      <text x="140" y="25">3</text>
      <text x="180" y="25">4</text>
      <text x="220" y="25">5</text>
      <text x="260" y="25">6</text>
      <text x="300" y="25">7</text>
      <text x="340" y="25">8</text>
      <text x="380" y="25">9</text>
      <text x="420" y="25">10</text>
      <text x="460" y="25">11</text>
      <text x="500" y="25">12</text>
      <text x="540" y="25">13</text>
      <text x="580" y="25">14</text>
      <text x="620" y="25">15</text>
      <text x="660" y="25">16</text>
      
      <!-- Y axis -->
      <text x="-18" y="25">0</text>
      <text x="-18" y="65">1</text>
      <text x="-18" y="105">2</text>
      <text x="-18" y="145">3</text>
      <text x="-18" y="185">4</text>
      <text x="-18" y="225">5</text>
      <text x="-18" y="265">6</text>
      <text x="-18" y="305">7</text>
      <text x="-18" y="345">8</text>
      <text x="-18" y="385">9</text>
      <text x="-18" y="425">10</text>
      <text x="-18" y="465">11</text>
      <text x="-18" y="505">12</text>
      <text x="-18" y="545">13</text>
      <text x="-18" y="585">14</text>
      <text x="-18" y="625">15</text>
      <text x="-18" y="665">16</text>
    </g>
    
    <!-- Coverage indicator text -->
    <text x="340" y="30" font-size="16" text-anchor="middle" fill="#e65100" font-weight="bold">🏠 小屋在中心</text>
    <text x="340" y="650" font-size="14" text-anchor="middle" fill="#1b5e20" font-weight="bold">17×17 祝尼魔覆盖区 = 289 格</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(100, 880)">
    <text x="0" y="0" font-size="16" font-weight="bold" fill="#4a3728">📋 图例:</text>
    
    <g font-size="14" fill="#4a3728">
      <text x="0" y="30">🏠 祝尼魔小屋 (占地 3×2，门口在中心)</text>
      <text x="280" y="30">💧 洒水器 + 压力喷嘴 (7×7 覆盖)</text>
      <text x="560" y="30">🟩 作物区</text>
      <text x="720" y="30">⬜ 路径</text>
    </g>
    
    <text x="0" y="58" font-size="14" fill="#2e7d32" font-weight="bold">
      📊 统计：17×17 = 289 格 · 4 个洒水器覆盖 196 格 · 小屋在正中心
    </text>
    
    <text x="0" y="85" font-size="13" fill="#e65100" font-weight="500">
      💡 关键：小屋门口在 (8,8)，向各方向延伸 8 格 = 覆盖区边界
    </text>
  </g>
</svg>
