<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team AI Dev - 文档查看</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            min-height: 100vh;
            line-height: 1.8;
            padding: 15px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 25px;
            background: rgba(255,215,0,0.3);
            border: 2px solid #ffd700;
            border-radius: 25px;
            color: #fff;
            text-decoration: none;
            margin-bottom: 20px;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        .back-btn:hover { background: rgba(255,215,0,0.5); transform: translateY(-2px); }
        .doc-content {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px 20px;
            border: 1px solid rgba(255,255,255,0.3);
            color: #333;
        }
        .doc-content h1, .doc-content h2, .doc-content h3, .doc-content h4, .doc-content h5, .doc-content h6 {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
            gap: 10px;
            margin: 20px 0 15px;
            font-weight: 700;
            line-height: 1.4;
        }
        .doc-content h1 { font-size: 1.8rem; color: #667eea; }
        .doc-content h2 { font-size: 1.5rem; color: #764ba2; border-bottom: 2px solid #667eea; padding-bottom: 8px; }
        .doc-content h3 { font-size: 1.2rem; color: #555; }
        .doc-content h4 { font-size: 1.1rem; color: #666; }
        .doc-content p { margin: 12px 0; line-height: 1.8; }
        .doc-content ul, .doc-content ol { margin: 12px 0 12px 25px; }
        .doc-content li { margin: 6px 0; line-height: 1.6; }
        .doc-content code {
            background: #f4f4f4;
            padding: 3px 8px;
            border-radius: 4px;
            font-family: "Courier New", "Consolas", monospace;
            font-size: 0.9em;
            color: #e83e8c;
            white-space: nowrap;
        }
        .doc-content pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 15px 0;
            font-size: 0.85rem;
        }
        .doc-content pre code { 
            background: none; 
            padding: 0; 
            color: inherit;
            white-space: pre;
        }
        .doc-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 0.9rem;
            display: block;
            overflow-x: auto;
        }
        .doc-content thead {
            display: table;
            width: 100%;
        }
        .doc-content tbody {
            display: table;
            width: 100%;
        }
        .doc-content th, .doc-content td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        .doc-content th { 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            color: #fff;
            font-weight: 600;
        }
        .doc-content tr:nth-child(even) { background: #f9f9f9; }
        .doc-content blockquote {
            border-left: 4px solid #667eea;
            padding: 10px 20px;
            margin: 15px 0;
            background: #f9f9f9;
            color: #666;
        }
        .doc-content a { color: #667eea; text-decoration: none; }
        .doc-content a:hover { text-decoration: underline; }
        .doc-content img { max-width: 100%; height: auto; border-radius: 8px; }
        .doc-content hr { border: none; border-top: 2px solid #eee; margin: 25px 0; }
        .doc-meta {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .loading {
            text-align: center;
            padding: 50px 20px;
            font-size: 1.1rem;
            color: #888;
        }
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg {
            text-align: center;
            padding: 30px;
            color: #ff6b6b;
            background: rgba(255,107,107,0.1);
            border-radius: 10px;
            margin: 20px 0;
        }
        .toc {
            background: rgba(102,126,234,0.1);
            padding: 15px 20px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #667eea;
        }
        .toc h4 { 
            color: #667eea; 
            margin-bottom: 10px; 
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .toc ul { margin: 0; padding-left: 20px; }
        .toc li { margin: 5px 0; }
        .toc a { color: #667eea; }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .doc-content { padding: 20px 15px; }
            .doc-content h1 { font-size: 1.5rem; }
            .doc-content h2 { font-size: 1.3rem; }
            .doc-content table { font-size: 0.8rem; }
            .doc-content th, .doc-content td { padding: 8px 5px; }
            .back-btn { padding: 8px 20px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">
            <span>←</span>
            <span>返回首页</span>
        </a>
        <div class="doc-content" id="content">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>文档加载中...</p>
            </div>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const doc = params.get('doc');
        
        if (doc) {
            fetch('docs/' + doc)
                .then(r => {
                    if (!r.ok) throw new Error('文档不存在');
                    return r.text();
                })
                .then(markdown => {
                    const html = marked.parse(markdown, {
                        breaks: true,
                        gfm: true
                    });
                    
                    const titleMatch = markdown.match(/^# (.+)$/m);
                    const title = titleMatch ? titleMatch[1] : doc.replace('.md', '');
                    
                    const headings = markdown.match(/^## (.+)$/gm) || [];
                    let toc = '';
                    if (headings.length > 0) {
                        toc = '<div class="toc"><h4>📑 目录</h4><ul>' + 
                            headings.map(h => {
                                const text = h.replace('## ', '');
                                return '<li><a href="#">' + text + '</a></li>';
                            }).join('') + 
                            '</ul></div>';
                    }
                    
                    document.getElementById('content').innerHTML = 
                        '<div class="doc-meta"><span>📄</span><span>' + doc + '</span><span>·</span><span>更新于 ' + new Date().toLocaleDateString('zh-CN') + '</span></div>' +
                        '<h1><span>' + title + '</span></h1>' +
                        toc +
                        html;
                })
                .catch(e => {
                    document.getElementById('content').innerHTML = 
                        '<div class="error-msg">❌ 文档加载失败：' + e.message + '</div>' +
                        '<p style="text-align:center;margin-top:20px;"><a href="index.html" class="back-btn">← 返回首页</a></p>';
                });
        } else {
            document.getElementById('content').innerHTML = 
                '<div class="error-msg">❌ 请指定文档名称</div>' +
                '<p style="text-align:center;margin-top:20px;"><a href="index.html" class="back-btn">← 返回首页</a></p>';
        }
    </script>
</body>
</html>
