<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900">
  <!-- Background -->
  <rect width="900" height="900" fill="#f5e6c8"/>
  
  <!-- Title -->
  <text x="450" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#4a3728">
    🏠 星露谷物语 - 祝尼魔小屋 + 洒水器布局图（修正版）
  </text>
  <text x="450" y="60" font-size="14" text-anchor="middle" fill="#6b5344">
    标准农场 · 洒水器 7×7 · 祝尼魔小屋 7×7 覆盖
  </text>
  
  <!-- Info box -->
  <g transform="translate(50, 80)">
    <rect width="800" height="60" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="400" y="25" font-size="13" text-anchor="middle" fill="#e65100" font-weight="bold">📊 覆盖范围说明</text>
    <text x="400" y="45" font-size="12" text-anchor="middle" fill="#5d4037">💧 洒水器：7×7（中心放置，覆盖周围 48 格） | 🏠 祝尼魔小屋：7×7 覆盖，占地 3×2</text>
  </g>
  
  <!-- Grid container (21×21 to show multiple units) -->
  <g transform="translate(50, 160)">
    <!-- Grid background -->
    <rect width="680" height="680" fill="#8bc34a" stroke="#4a3728" stroke-width="3"/>
    
    <!-- Grid lines (17×17) -->
    <g stroke="#689f38" stroke-width="1">
      <!-- Vertical lines -->
      <line x1="40" y1="0" x2="40" y2="680"/>
      <line x1="80" y1="0" x2="80" y2="680"/>
      <line x1="120" y1="0" x2="120" y2="680"/>
      <line x1="160" y1="0" x2="160" y2="680"/>
      <line x1="200" y1="0" x2="200" y2="680"/>
      <line x1="240" y1="0" x2="240" y2="680"/>
      <line x1="280" y1="0" x2="280" y2="680"/>
      <line x1="320" y1="0" x2="320" y2="680"/>
      <line x1="360" y1="0" x2="360" y2="680"/>
      <line x1="400" y1="0" x2="400" y2="680"/>
      <line x1="440" y1="0" x2="440" y2="680"/>
      <line x1="480" y1="0" x2="480" y2="680"/>
      <line x1="520" y1="0" x2="520" y2="680"/>
      <line x1="560" y1="0" x2="560" y2="680"/>
      <line x1="600" y1="0" x2="600" y2="680"/>
      <line x1="640" y1="0" x2="640" y2="680"/>
      
      <!-- Horizontal lines -->
      <line x1="0" y1="40" x2="680" y2="40"/>
      <line x1="0" y1="80" x2="680" y2="80"/>
      <line x1="0" y1="120" x2="680" y2="120"/>
      <line x1="0" y1="160" x2="680" y2="160"/>
      <line x1="0" y1="200" x2="680" y2="200"/>
      <line x1="0" y1="240" x2="680" y2="240"/>
      <line x1="0" y1="280" x2="680" y2="280"/>
      <line x1="0" y1="320" x2="680" y2="320"/>
      <line x1="0" y1="360" x2="680" y2="360"/>
      <line x1="0" y1="400" x2="680" y2="400"/>
      <line x1="0" y1="440" x2="680" y2="440"/>
      <line x1="0" y1="480" x2="680" y2="480"/>
      <line x1="0" y1="520" x2="680" y2="520"/>
      <line x1="0" y1="560" x2="680" y2="560"/>
      <line x1="0" y1="600" x2="680" y2="600"/>
      <line x1="0" y1="640" x2="680" y2="640"/>
    </g>
    
    <!-- Crop areas where BOTH sprinkler AND junimo overlap -->
    <!-- Based on 7×7 overlap pattern -->
    <g fill="#a5d6a7" opacity="0.7">
      <!-- Overlap zones: each 5×5 area centered on sprinkler -->
      <!-- Zone 1: around (3,3) -->
      <rect x="40" y="40" width="200" height="200"/>
      <!-- Zone 2: around (10,3) -->
      <rect x="320" y="40" width="200" height="200"/>
      <!-- Zone 3: around (3,10) -->
      <rect x="40" y="320" width="200" height="200"/>
      <!-- Zone 4: around (10,10) -->
      <rect x="320" y="320" width="200" height="200"/>
    </g>
    
    <!-- Sprinklers (must be in center of 7×7 = position 3,3 within each 7×7 block) -->
    <g font-size="20" text-anchor="middle" dominant-baseline="central">
      <!-- Sprinkler 1: (3,3) -->
      <circle cx="140" cy="140" r="20" fill="#2196f3" stroke="#1565c0" stroke-width="3"/>
      <text x="140" y="140" fill="white" font-size="18">💧</text>
      
      <!-- Sprinkler 2: (10,3) -->
      <circle cx="420" cy="140" r="20" fill="#2196f3" stroke="#1565c0" stroke-width="3"/>
      <text x="420" y="140" fill="white" font-size="18">💧</text>
      
      <!-- Sprinkler 3: (3,10) -->
      <circle cx="140" cy="420" r="20" fill="#2196f3" stroke="#1565c0" stroke-width="3"/>
      <text x="140" y="420" fill="white" font-size="18">💧</text>
      
      <!-- Sprinkler 4: (10,10) -->
      <circle cx="420" cy="420" r="20" fill="#2196f3" stroke="#1565c0" stroke-width="3"/>
      <text x="420" y="420" fill="white" font-size="18">💧</text>
    </g>
    
    <!-- Junimo Hut coverage zones (7×7 each) -->
    <g fill="#ff9800" opacity="0.3">
      <!-- Junimo zone 1 -->
      <rect x="40" y="40" width="280" height="280" fill="none" stroke="#ff9800" stroke-width="2" stroke-dasharray="5,5"/>
      <!-- Junimo zone 2 -->
      <rect x="320" y="40" width="280" height="280" fill="none" stroke="#ff9800" stroke-width="2" stroke-dasharray="5,5"/>
      <!-- Junimo zone 3 -->
      <rect x="40" y="320" width="280" height="280" fill="none" stroke="#ff9800" stroke-width="2" stroke-dasharray="5,5"/>
      <!-- Junimo zone 4 -->
      <rect x="320" y="320" width="280" height="280" fill="none" stroke="#ff9800" stroke-width="2" stroke-dasharray="5,5"/>
    </g>
    
    <!-- Junimo Huts (3×2 each, placed at edge of coverage) -->
    <g transform="translate(0, 0)">
      <!-- Hut 1: at bottom of zone 1 -->
      <g transform="translate(100, 260)">
        <rect width="120" height="80" fill="#8d6e63" stroke="#4e342e" stroke-width="3"/>
        <polygon points="0,0 60,-35 120,0" fill="#5d4037"/>
        <rect x="45" y="30" width="30" height="50" fill="#3e2723"/>
        <text x="60" y="65" font-size="18" text-anchor="middle">🏠</text>
      </g>
      
      <!-- Hut 2: at bottom of zone 2 -->
      <g transform="translate(380, 260)">
        <rect width="120" height="80" fill="#8d6e63" stroke="#4e342e" stroke-width="3"/>
        <polygon points="0,0 60,-35 120,0" fill="#5d4037"/>
        <rect x="45" y="30" width="30" height="50" fill="#3e2723"/>
        <text x="60" y="65" font-size="18" text-anchor="middle">🏠</text>
      </g>
    </g>
    
    <!-- Path areas (gray) -->
    <g fill="#9e9e9e" opacity="0.4">
      <rect x="240" y="0" width="80" height="680"/>
      <rect x="0" y="240" width="680" height="80"/>
    </g>
    
    <!-- Axis labels -->
    <g font-size="10" fill="#4a3728" text-anchor="middle">
      <!-- X axis -->
      <text x="20" y="25">0</text>
      <text x="60" y="25">1</text>
      <text x="100" y="25">2</text>
      <text x="140" y="25">3</text>
      <text x="180" y="25">4</text>
      <text x="220" y="25">5</text>
      <text x="260" y="25">6</text>
      <text x="300" y="25">7</text>
      <text x="340" y="25">8</text>
      <text x="380" y="25">9</text>
      <text x="420" y="25">10</text>
      <text x="460" y="25">11</text>
      <text x="500" y="25">12</text>
      <text x="540" y="25">13</text>
      <text x="580" y="25">14</text>
      <text x="620" y="25">15</text>
      <text x="660" y="25">16</text>
      
      <!-- Y axis -->
      <text x="-15" y="25">0</text>
      <text x="-15" y="65">1</text>
      <text x="-15" y="105">2</text>
      <text x="-15" y="145">3</text>
      <text x="-15" y="185">4</text>
      <text x="-15" y="225">5</text>
      <text x="-15" y="265">6</text>
      <text x="-15" y="305">7</text>
      <text x="-15" y="345">8</text>
      <text x="-15" y="385">9</text>
      <text x="-15" y="425">10</text>
      <text x="-15" y="465">11</text>
      <text x="-15" y="505">12</text>
      <text x="-15" y="545">13</text>
      <text x="-15" y="585">14</text>
      <text x="-15" y="625">15</text>
      <text x="-15" y="665">16</text>
    </g>
  </g>
  
  <!-- Legend -->
  <g transform="translate(50, 860)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#4a3728">图例:</text>
    
    <g font-size="12" fill="#4a3728">
      <text x="0" y="22">🏠 祝尼魔小屋 (3×2 占地)</text>
      <text x="180" y="22">💧 铱金洒水器 (7×7 覆盖，必须居中)</text>
      <text x="430" y="22">🟩 作物区 (同时被两者覆盖)</text>
      <text x="640" y="22">⬜ 路径/空地</text>
    </g>
    
    <text x="0" y="42" font-size="12" fill="#e65100" font-weight="bold">
      ⚠️ 注意：洒水器必须放在 7×7 土地的正中央（第 4 行第 4 列）
    </text>
  </g>
</svg>
