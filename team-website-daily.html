<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目日报 - Team AI Dev</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            min-height: 100vh;
            line-height: 1.8;
            padding: 15px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 25px;
            background: rgba(255,215,0,0.3);
            border: 2px solid #ffd700;
            border-radius: 25px;
            color: #fff;
            text-decoration: none;
            margin-bottom: 20px;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        .back-btn:hover { background: rgba(255,215,0,0.5); transform: translateY(-2px); }
        .doc-content {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px 25px;
            border: 1px solid rgba(255,255,255,0.3);
            color: #333;
        }
        .doc-content h1 { font-size: 2rem; margin: 25px 0 20px; color: #667eea; font-weight: 700; }
        .doc-content h2 { font-size: 1.6rem; margin: 30px 0 15px; color: #764ba2; font-weight: 600; border-bottom: 3px solid #667eea; padding-bottom: 10px; }
        .doc-content h3 { font-size: 1.3rem; margin: 25px 0 12px; color: #555; font-weight: 600; }
        .doc-content p { margin: 15px 0; line-height: 1.8; }
        .doc-content ul, .doc-content ol { margin: 15px 0 15px 30px; }
        .doc-content li { margin: 8px 0; line-height: 1.7; }
        .doc-content code {
            background: #f4f4f4;
            padding: 4px 10px;
            border-radius: 5px;
            font-family: "Courier New", "Consolas", monospace;
            font-size: 0.9em;
            color: #e83e8c;
        }
        .doc-content pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 20px 0;
            font-size: 0.85rem;
        }
        .doc-content pre code { background: none; padding: 0; color: inherit; }
        .doc-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 25px 0;
            font-size: 0.95rem;
            display: block;
            overflow-x: auto;
        }
        .doc-content thead { display: table; width: 100%; }
        .doc-content tbody { display: table; width: 100%; }
        .doc-content th, .doc-content td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        .doc-content th { 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            color: #fff;
            font-weight: 600;
        }
        .doc-content tr:nth-child(even) { background: #f9f9f9; }
        .doc-content blockquote {
            border-left: 5px solid #667eea;
            padding: 15px 25px;
            margin: 20px 0;
            background: #f9f9f9;
            color: #666;
        }
        .doc-content a { color: #667eea; text-decoration: none; }
        .doc-content a:hover { text-decoration: underline; }
        .doc-content img { max-width: 100%; height: auto; border-radius: 10px; }
        .doc-content hr { border: none; border-top: 2px solid #eee; margin: 30px 0; }
        .doc-meta {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.2rem;
            color: #888;
        }
        .loading-spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg {
            text-align: center;
            padding: 40px;
            color: #ff6b6b;
            background: rgba(255,107,107,0.1);
            border-radius: 12px;
            margin: 25px 0;
        }
        .daily-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .daily-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
        }
        .daily-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            background: rgba(255,255,255,0.15);
            border-color: #ffd700;
        }
        .daily-date { font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; color: #ffd700; }
        .daily-title { font-size: 1rem; opacity: 0.9; margin-bottom: 15px; }
        .daily-meta { font-size: 0.85rem; opacity: 0.7; }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .doc-content { padding: 25px 20px; }
            .doc-content h1 { font-size: 1.6rem; }
            .doc-content h2 { font-size: 1.3rem; }
            .doc-content table { font-size: 0.85rem; }
            .doc-content th, .doc-content td { padding: 10px 6px; }
            .back-btn { padding: 8px 20px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">
            <span>←</span>
            <span>返回团队官网</span>
        </a>
        <div class="doc-content" id="content">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>加载日报列表中...</p>
            </div>
        </div>
    </div>
    <script>
        // 模拟日报列表（实际应该从服务器获取）
        const dailyReports = [
            {
                date: '2026-03-04',
                title: '项目日报 第 1 期',
                file: '2026-03-04.md',
                highlights: '后端代码优化完成、前端独立仓库创建、团队网站 V3 上线'
            }
        ];

        const params = new URLSearchParams(window.location.search);
        const report = params.get('date');
        
        if (report) {
            // 显示具体日报
            fetch('reports/daily/' + report + '.md')
                .then(r => {
                    if (!r.ok) throw new Error('日报不存在');
                    return r.text();
                })
                .then(markdown => {
                    const html = marked.parse(markdown, { breaks: true, gfm: true });
                    document.getElementById('content').innerHTML = 
                        '<div class="doc-meta">📅 ' + report + ' · 更新于 ' + new Date().toLocaleDateString('zh-CN') + '</div>' +
                        html;
                })
                .catch(e => {
                    document.getElementById('content').innerHTML = 
                        '<div class="error-msg">❌ 日报加载失败：' + e.message + '</div>' +
                        '<p style="text-align:center;margin-top:20px;"><a href="daily.html" class="back-btn">返回日报列表</a></p>';
                });
        } else {
            // 显示日报列表
            let listHtml = '<h1 style="color: #667eea; margin-bottom: 10px;">📊 项目日报</h1>';
            listHtml += '<p style="opacity: 0.8; margin-bottom: 30px;">Team AI Dev 每日项目进展汇报</p>';
            listHtml += '<div class="daily-list">';
            
            dailyReports.forEach(item => {
                listHtml += `
                    <div class="daily-card" onclick="window.location.href='daily.html?date=${item.date}'">
                        <div class="daily-date">${item.date}</div>
                        <div class="daily-title">${item.title}</div>
                        <div class="daily-meta">📝 ${item.highlights}</div>
                    </div>
                `;
            });
            
            listHtml += '</div>';
            document.getElementById('content').innerHTML = listHtml;
        }
    </script>
</body>
</html>
